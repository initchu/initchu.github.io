<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 迷失在云原生星系</title>
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #4b0082;
            --accent: #00d4ff;
            --text: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #05050a;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/images/404-bg.png');
            background-size: cover;
            background-position: center;
        }

        .glass-box {
            position: relative;
            padding: 4rem 6rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 10rem;
            margin: 0;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.4));
            line-height: 1;
        }

        p {
            color: var(--text);
            font-size: 1.5rem;
            margin: 2rem 0;
            opacity: 0.9;
            letter-spacing: 0.1rem;
        }

        .description {
            font-size: 1.1rem;
            opacity: 0.6;
            margin-bottom: 3rem;
        }

        .btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            color: white;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
            border: 2px solid transparent;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(138, 43, 226, 0.5);
            border-color: var(--accent);
        }

        /* 漂浮的小星星/粒子 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stars" id="particles"></div>
        <div class="glass-box">
            <h1>404</h1>
            <p><strong>LOST IN CLOUD-NATIVE SPACE</strong></p>
            <div class="description">
                您所探寻的坐标点似乎在寻找梦想的星途中走丢了...
            </div>
            <a href="/" class="btn">返回地球主控中心</a>
        </div>
    </div>
</body>
</html>
